<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalized Cake | LOCAL KITCHEN PH</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
      body { background-color: #faf9f4; }
      .personalized-container {
        max-width: 800px;
        margin: 120px auto 60px;
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        border-top: 8px solid var(--primary);
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 0.95rem;
      }
      .form-group select, .form-group input, .form-group textarea {
        width: 100%;
        padding: 12px 15px;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-family: inherit;
        font-size: 1rem;
        transition: border-color 0.3s, box-shadow 0.3s;
      }
      .form-group select:focus, .form-group input:focus, .form-group textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(224, 187, 108, 0.2);
      }
      .price-hint {
        font-size: 0.8rem;
        color: #888;
        margin-top: 4px;
        display: block;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/" class="logo" style="text-decoration: none;">
        <img src="/images/logo.png" alt="Local Kitchen PH Logo">
        <span>LOCAL KITCHEN PH</span>
      </a>
      <nav id="mainNav">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/#cakes">Cakes</a></li>
          <li><a href="/#cupcakes">Cupcakes</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <button class="btn btn-primary" id="viewCartBtn">View Cart <span class="cart-count" id="cartCount">0</span></button>
    </header>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h2>Your Cart</h2>
        <button id="closeCartBtn">&times;</button>
      </div>
      <div id="cartItems"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Subtotal</span>
          <span id="cartTotal">₱0</span>
        </div>
        <button class="btn btn-primary" id="checkoutBtn" style="width: 100%;">Proceed to Checkout</button>
        <button class="btn btn-outline" id="clearCartBtn" style="width: 100%; margin-top: 10px; color: #ff4444; border-color: #ff4444;">Empty Cart</button>
      </div>
    </div>

    <main>
      <div class="personalized-container">
        <div style="text-align: center; margin-bottom: 40px;">
          <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px;">Make Your Dream Cake</h1>
          <p style="color: #666;">Fill out the details below and we'll create a masterpiece just for you.</p>
        </div>

        <form id="customCakeForm">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
            <div class="form-group">
              <label for="cakeOccasion">Occasion</label>
              <select id="cakeOccasion" name="occasion" required>
                <option value="" disabled selected>Select an occasion</option>
                <option value="Birthday">Birthday</option>
                <option value="Wedding">Wedding</option>
                <option value="Anniversary">Anniversary</option>
                <option value="Graduation">Graduation</option>
                <option value="Christmas">Christmas</option>
                <option value="New Year">New Year</option>
                <option value="Others">Others</option>
              </select>
              <input type="text" id="occasionSpecify" name="occasion_specify" placeholder="Please specify occasion" style="display: none; margin-top: 10px;">
            </div>
            <div class="form-group">
              <label for="baseFlavor">Base Flavor</label>
              <select id="baseFlavor" name="flavor" required>
                <option value="" disabled selected>Select base flavor</option>
                <option value="Chocolate">Chocolate</option>
                <option value="Vanilla">Vanilla</option>
                <option value="Mango">Mango</option>
                <option value="Strawberry">Strawberry</option>
                <option value="Mocha">Mocha</option>
                <option value="Coffee">Coffee</option>
                <option value="Red Velvet">Red Velvet</option>
                <option value="Matcha">Matcha</option>
              </select>
            </div>
          </div>

          <div style="margin-bottom: 25px;">
            <div class="form-group">
              <label for="cakeSize">Preferred Size</label>
              <select id="cakeSize" name="size" required>
                <option value="6-inch">6-inch Round (Starts at ₱1,500)</option>
                <option value="8-inch">8-inch Round (Starts at ₱2,000)</option>
                <option value="10-inch">10-inch Round (Starts at ₱2,500)</option>
              </select>
              <small class="price-hint">* Final price may vary based on design</small>
            </div>
          </div>

          <div style="margin-bottom: 25px;">
            <div class="form-group">
              <label for="cakeFilling">Filling</label>
              <select id="cakeFilling" name="filling" required>
                <option value="" disabled selected>Select filling</option>
                <option value="Chocolate">Chocolate</option>
                <option value="Vanilla">Vanilla</option>
                <option value="White Chocolate">White Chocolate</option>
                <option value="Mango">Mango</option>
                <option value="Strawberry">Strawberry</option>
                <option value="Mocha">Mocha</option>
                <option value="Coffee">Coffee</option>
                <option value="Red Velvet">Red Velvet</option>
                <option value="Matcha">Matcha</option>
              </select>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 25px;">
            <label>Inspiration / Design Reference</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
              <div style="position: relative;">
                <input type="file" name="ref_image" accept="image/*" id="refImage" style="opacity: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer;">
                <div style="padding: 12px; border: 2px dashed #ddd; border-radius: 10px; text-align: center; color: #888; font-size: 0.9rem; pointer-events: none;" id="fileLabel">
                  Click to upload image
                </div>
              </div>
              <input type="text" name="ref_link" placeholder="Or paste image link here">
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 30px;">
            <label for="cakeRequests">Special Requests & Dedication</label>
            <textarea id="cakeRequests" name="requests" rows="3" placeholder="Color palette, specific dedication, or any other preferences..."></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.2rem; padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px rgba(224, 187, 108, 0.3);">
            Proceed to Checkout
          </button>
        </form>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
    <script>
      // Occasion Toggle
      const occasionSelect = document.getElementById('cakeOccasion');
      const occasionSpecify = document.getElementById('occasionSpecify');
      if (occasionSelect) {
        occasionSelect.addEventListener('change', () => {
          occasionSpecify.style.display = occasionSelect.value === 'Others' ? 'block' : 'none';
          if (occasionSelect.value === 'Others') occasionSpecify.required = true;
          else occasionSpecify.required = false;
        });
      }

      // File label update
      const refImage = document.getElementById('refImage');
      const fileLabel = document.getElementById('fileLabel');
      if (refImage) {
        refImage.addEventListener('change', (e) => {
          if (e.target.files.length > 0) {
            fileLabel.textContent = 'Selected: ' + e.target.files[0].name;
            fileLabel.style.borderColor = 'var(--primary)';
            fileLabel.style.color = 'var(--primary)';
          }
        });
      }
    </script>
  </body>
</html>
