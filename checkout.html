<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Local Kitchen PH</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body style="background-color: #faf9f4;">
    <header>
      <a href="/" class="logo" style="text-decoration: none;">
        <img src="/images/logo.png" alt="Local Kitchen PH Logo">
        <span>LOCAL KITCHEN PH</span>
      </a>
    </header>

    <main style="padding-top: 100px;">
      <div style="max-width: 1000px; margin: 0 auto 20px; padding: 0 20px;">
        <a href="/?openCart=true#cakes" style="text-decoration: none; color: #999; font-size: 1.5rem; transition: color 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='#999'">
          ←
        </a>
      </div>
      <section class="order-section">
        <div class="order-form-container" style="max-width: 1000px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;">
          
          <!-- Order Summary -->
          <div style="background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #eee;">
            <h2 style="margin-bottom: 25px; font-size: 1.8rem;">Order Summary</h2>
            <div id="checkoutItems" style="margin-bottom: 20px;">
              <!-- Items injected here -->
            </div>
            <div style="border-top: 2px solid var(--secondary); padding-top: 20px; margin-bottom: 25px;">
              <h3 style="display: flex; justify-content: space-between;">Total <span id="checkoutTotal">₱0</span></h3>
            </div>

            <div style="padding-top: 20px; border-top: 1px solid #eee;">
              <label id="couponLabel" for="coupon" style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: #666;">Have a Coupon Code?</label>
              <div id="couponInputArea" style="display: flex; gap: 10px;">
                <input type="text" id="coupon" name="coupon" placeholder="Enter code" style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit;">
                <button type="button" id="applyCouponBtn" class="btn btn-outline" style="padding: 10px 20px; font-size: 0.8rem;">Apply</button>
              </div>
              <div id="couponMessage" style="font-size: 0.85rem; margin-top: 8px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;"></div>
              <a href="/?openCart=true#cakes" style="display: block; text-align: center; color: #999; font-size: 0.9rem; text-decoration: underline; cursor: pointer;">+ Add more items to cart</a>
            </div>
          </div>

          <!-- Checkout Details -->
          <div>
            <h2 style="margin-bottom: 25px; font-size: 1.8rem;">Customization & Add-ons</h2>
            <form id="checkoutForm">
              <div class="form-group" style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 10px; font-weight: 700;">Complimentary Add-ons</label>
                
                <div style="margin-bottom: 15px;">
                  <span style="font-size: 0.9rem; color: #666; display: block; margin-bottom: 5px;">Classic Candle (1 Free per Cake, ₱10 for extras)</span>
                  <div style="display: flex; gap: 20px;">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
                      Pink <input type="number" name="addon_classic_pink" value="0" min="0" max="10" class="addon-number" style="width: 50px; padding: 2px 5px;">
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
                      Blue <input type="number" name="addon_classic_blue" value="0" min="0" max="10" class="addon-number" style="width: 50px; padding: 2px 5px;">
                    </label>
                  </div>
                </div>

                <div style="margin-bottom: 15px;">
                  <span style="font-size: 0.9rem; color: #666; display: block; margin-bottom: 5px;">Number Candles (₱30 each)</span>
                  <div id="numberCandleContainer" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
                    <label style="display: flex; align-items: center; gap: 5px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="0"> 0</label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="1"> 1</label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="2"> 2</label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="3"> 3</label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="4"> 4</label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="5"> 5</label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="6"> 6</label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="7"> 7</label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="8"> 8</label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;"><input type="checkbox" class="num-candle addon-checkbox" name="addon_number" value="9"> 9</label>
                  </div>
                </div>

                <div style="margin-bottom: 25px;">
                  <span style="font-size: 0.9rem; color: #666; display: block; margin-bottom: 8px;">Themed Acrylic Toppers (₱50 each)</span>
                  <div class="custom-multiselect" style="position: relative;">
                    <style>
                      .topper-option { display: block; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; transition: background 0.2s; }
                      .topper-option:hover { background: #fdfbf7; }
                      .topper-option.selected { background: #fdfbf7; font-weight: 600; color: var(--primary); }
                      .topper-option.selected::after { content: '✓'; float: right; font-weight: bold; }
                    </style>
                    <div id="topperDropdownToggle" style="border: 1px solid #ddd; padding: 10px 15px; border-radius: 8px; cursor: pointer; background: #fff; display: flex; justify-content: space-between; align-items: center; min-height: 46px; transition: border-color 0.3s;">
                      <div id="topperDropdownLabel" style="color: #999; font-size: 0.9rem;">Select Toppers...</div>
                      <span style="font-size: 0.8em; color: #999;">▼</span>
                    </div>
                    <div id="topperDropdownMenu" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.1);">
                      <label class="topper-option"><input type="checkbox" name="addon_topper" value="Birthday" class="addon-checkbox topper-cb" style="display: none;"> Birthday</label>
                      <label class="topper-option"><input type="checkbox" name="addon_topper" value="Graduation" class="addon-checkbox topper-cb" style="display: none;"> Graduation</label>
                      <label class="topper-option"><input type="checkbox" name="addon_topper" value="Anniversary" class="addon-checkbox topper-cb" style="display: none;"> Anniversary</label>
                      <label class="topper-option"><input type="checkbox" name="addon_topper" value="Christmas" class="addon-checkbox topper-cb" style="display: none;"> Christmas</label>
                      <label class="topper-option" style="border-bottom: none;"><input type="checkbox" name="addon_topper" value="New Year" class="addon-checkbox topper-cb" style="display: none;"> New Year</label>
                    </div>
                  </div>
                </div>
              </div>

              <div class="form-group" style="margin-bottom: 20px;">
                <label for="details">Personalization / Special Requests</label>
                <textarea id="details" name="details" rows="3" placeholder="Theme, dedication for cakes, or special instructions..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 18px;">Proceed to Payment & Details</button>
            </form>
          </div>

        </div>
      </section>
    </main>

    <footer style="margin-top: 50px;">
      <p>&copy; 2026 Local Kitchen PH. All Rights Reserved.</p>
    </footer>

    <script type="module">
      import '/src/style.css';
      
      const checkoutItemsEl = document.getElementById('checkoutItems');
      const checkoutTotalEl = document.getElementById('checkoutTotal');
      const checkoutForm = document.getElementById('checkoutForm');

      // Load cart data from localStorage
      const cartData = JSON.parse(localStorage.getItem('localKitchenCart') || '[]');
      
      if (cartData.length === 0) {
        localStorage.removeItem('localKitchenTempAddons'); // Clear add-ons if cart is empty
        window.location.href = '/';
      }

      let currentDiscount = 0;
      let isCouponApplied = false;

      function updateCheckoutUI() {
        let itemsHtml = cartData.map(item => `
          <div style="display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px;">
            <div>
              <h4 style="margin: 0;">${item.name}</h4>
              <p style="margin: 5px 0 0; font-size: 0.9rem; color: #666;">${item.price > 0 ? `₱${item.price.toLocaleString()} x ${item.quantity}` : 'Price TBD'}</p>
            </div>
            <strong style="color: var(--primary);">${item.price > 0 ? `₱${(item.price * item.quantity).toLocaleString()}` : 'Quote Pending'}</strong>
          </div>
        `).join('');

        // Base total from cart
        const cartTotal = cartData.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        // Add-ons for summary and total
        let addonTotal = 0;
        
        // Classic Candles (1 Free per cake, extra is ₱10)
        // Only count items that are NOT cupcakes towards the free candle limit
        const totalCakes = cartData.reduce((sum, item) => sum + (item.name.toLowerCase().includes('cupcake') ? 0 : item.quantity), 0);
        const pinkInput = document.querySelector('input[name="addon_classic_pink"]');
        const blueInput = document.querySelector('input[name="addon_classic_blue"]');
        const pinkCount = parseInt(pinkInput ? pinkInput.value : '0') || 0;
        const blueCount = parseInt(blueInput ? blueInput.value : '0') || 0;
        const totalClassic = pinkCount + blueCount;

        if (totalClassic > 0) {
          const freeClassic = Math.min(totalClassic, totalCakes);
          const paidClassic = Math.max(0, totalClassic - totalCakes);
          
          if (freeClassic > 0) {
             itemsHtml += `
              <div style="display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dotted #eee;">
                <p style="margin: 0; font-size: 0.9rem;">Classic Candle (${freeClassic}x Free)</p>
                <strong style="font-size: 0.9rem;">Free</strong>
              </div>
            `;
          }
          if (paidClassic > 0) {
             addonTotal += paidClassic * 10;
             itemsHtml += `
              <div style="display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dotted #eee;">
                <p style="margin: 0; font-size: 0.9rem;">Classic Candle (${paidClassic}x Extra)</p>
                <strong style="font-size: 0.9rem;">₱${paidClassic * 10}</strong>
              </div>
            `;
          }
        }

        // Number Candles
        const selectedNumbers = Array.from(document.querySelectorAll('.num-candle:checked')).map(cb => cb.value);
        selectedNumbers.forEach(num => {
          addonTotal += 30;
          itemsHtml += `
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dotted #eee;">
              <p style="margin: 0; font-size: 0.9rem;">Number Candle (${num})</p>
              <strong style="font-size: 0.9rem;">₱30</strong>
            </div>
          `;
        });

        // Acrylic Toppers
        const selectedToppers = Array.from(document.querySelectorAll('.topper-cb:checked')).map(cb => cb.value);
        
        // Update custom dropdown label and menu styles
        const topperDropdownLabel = document.getElementById('topperDropdownLabel');
        
        // Update menu checkmarks
        document.querySelectorAll('.topper-cb').forEach(cb => {
          if (cb.checked) {
            cb.closest('label').classList.add('selected');
          } else {
            cb.closest('label').classList.remove('selected');
          }
        });

        if (selectedToppers.length > 0) {
          topperDropdownLabel.innerHTML = '';
          topperDropdownLabel.style.display = 'flex';
          topperDropdownLabel.style.flexWrap = 'wrap';
          topperDropdownLabel.style.gap = '5px';
          
          selectedToppers.forEach(topper => {
            topperDropdownLabel.innerHTML += `<span style="background: rgba(212, 160, 23, 0.15); color: var(--primary-dark); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600;">${topper}</span>`;
          });
          document.getElementById('topperDropdownToggle').style.borderColor = 'var(--primary)';
        } else {
          topperDropdownLabel.innerHTML = `Select Toppers...`;
          topperDropdownLabel.style.display = 'block';
          topperDropdownLabel.style.color = '#999';
          document.getElementById('topperDropdownToggle').style.borderColor = '#ddd';
        }

        selectedToppers.forEach(topper => {
          addonTotal += 50;
          itemsHtml += `
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dotted #eee;">
              <p style="margin: 0; font-size: 0.9rem;">Acrylic Topper (${topper})</p>
              <strong style="font-size: 0.9rem;">₱50</strong>
            </div>
          `;
        });

        const finalTotal = cartTotal + addonTotal;
        
        // Coupon Logic
        const couponMessage = document.getElementById('couponMessage');
        const couponInputArea = document.getElementById('couponInputArea');
        currentDiscount = 0;
        
        if (isCouponApplied) {
          if (finalTotal >= 3000) {
            currentDiscount = finalTotal * 0.05;
            couponMessage.innerHTML = `
              <span style="color: green;">LKWEB applied: 5% off!</span>
              <button type="button" id="removeCouponBtn" style="background: none; border: none; color: #d32f2f; cursor: pointer; font-size: 0.75rem; text-decoration: underline; padding: 0;">Remove</button>
            `;
            couponInputArea.style.display = 'none';
            document.getElementById('couponLabel').style.display = 'none';

            // Add listener for remove button (needs to be done after innerHTML update)
            setTimeout(() => {
              const btn = document.getElementById('removeCouponBtn');
              if (btn) {
                btn.onclick = () => {
                  isCouponApplied = false;
                  document.getElementById('coupon').value = '';
                  couponMessage.innerHTML = '';
                  couponInputArea.style.display = 'flex';
                  document.getElementById('couponLabel').style.display = 'block';
                  updateCheckoutUI();
                };
              }
            }, 0);
            
            itemsHtml += `
              <div style="display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; color: green;">
                <p style="margin: 0; font-size: 0.9rem;">Discount (5% off)</p>
                <strong style="font-size: 0.9rem;">-₱${currentDiscount.toLocaleString()}</strong>
              </div>
            `;
          } else {
            isCouponApplied = false;
            couponMessage.textContent = 'Minimum spend of ₱3,000 required.';
            couponMessage.style.color = '#d32f2f';
            couponInputArea.style.display = 'flex';
            document.getElementById('couponLabel').style.display = 'block';
          }
        }

        checkoutItemsEl.innerHTML = itemsHtml;
        checkoutTotalEl.textContent = `₱${(finalTotal - currentDiscount).toLocaleString()}`;
        
        saveTempAddons();
      }

      function saveTempAddons() {
        const pinkCount = document.querySelector('input[name="addon_classic_pink"]').value;
        const blueCount = document.querySelector('input[name="addon_classic_blue"]').value;
        const selectedNumbers = Array.from(document.querySelectorAll('.num-candle:checked')).map(cb => cb.value);
        const selectedToppers = Array.from(document.querySelectorAll('.topper-cb:checked')).map(cb => cb.value);
        const details = document.getElementById('details').value;
        const coupon = document.getElementById('coupon').value;

        const tempAddons = {
          pinkCount,
          blueCount,
          selectedNumbers,
          selectedToppers,
          details,
          coupon,
          isCouponApplied
        };
        localStorage.setItem('localKitchenTempAddons', JSON.stringify(tempAddons));
      }

      function loadTempAddons() {
        const tempAddons = JSON.parse(localStorage.getItem('localKitchenTempAddons'));
        if (!tempAddons) return;

        document.querySelector('input[name="addon_classic_pink"]').value = tempAddons.pinkCount || 0;
        document.querySelector('input[name="addon_classic_blue"]').value = tempAddons.blueCount || 0;
        
        if (tempAddons.selectedNumbers) {
          tempAddons.selectedNumbers.forEach(val => {
            const cb = document.querySelector(`.num-candle[value="${val}"]`);
            if (cb) cb.checked = true;
          });
        }

        if (tempAddons.selectedToppers) {
          tempAddons.selectedToppers.forEach(val => {
            const cb = document.querySelector(`.topper-cb[value="${val}"]`);
            if (cb) cb.checked = true;
          });
        }

        document.getElementById('details').value = tempAddons.details || '';
        document.getElementById('coupon').value = tempAddons.coupon || '';
        isCouponApplied = tempAddons.isCouponApplied || false;
      }

      loadTempAddons();
      updateCheckoutUI();

      // Custom dropdown toggle logic
      const topperDropdownToggle = document.getElementById('topperDropdownToggle');
      const topperDropdownMenu = document.getElementById('topperDropdownMenu');
      topperDropdownToggle.addEventListener('click', () => {
        topperDropdownMenu.style.display = topperDropdownMenu.style.display === 'none' ? 'block' : 'none';
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.custom-multiselect')) {
          topperDropdownMenu.style.display = 'none';
        }
      });

      // Add-on listeners
      const addonInputs = document.querySelectorAll('.addon-checkbox, .addon-number');
      addonInputs.forEach(input => {
        input.addEventListener('change', () => {
          updateCheckoutUI();
        });
      });

      document.getElementById('applyCouponBtn').addEventListener('click', () => {
        const couponInput = document.getElementById('coupon').value.trim();
        const couponMessage = document.getElementById('couponMessage');
        
        if (couponInput === 'LKWEB') {
          isCouponApplied = true;
          updateCheckoutUI();
        } else {
          isCouponApplied = false;
          if (couponInput) {
            couponMessage.textContent = 'Invalid coupon code.';
            couponMessage.style.color = '#d32f2f';
          } else {
            couponMessage.textContent = '';
          }
          updateCheckoutUI();
        }
      });
      
      document.getElementById('details').addEventListener('input', saveTempAddons);
      
      document.getElementById('coupon').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('applyCouponBtn').click();
        }
      });
      
      document.getElementById('coupon').addEventListener('input', () => {
        // Clear message if they start typing again
        document.getElementById('couponMessage').textContent = '';
      });

      checkoutForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const formData = new FormData(checkoutForm);
        const addons = Object.fromEntries(formData.entries());
        
        // Collect multi-select add-ons
        const selectedNumbers = Array.from(document.querySelectorAll('.num-candle:checked')).map(cb => cb.value);
        const selectedToppers = Array.from(document.querySelectorAll('.topper-cb:checked')).map(cb => cb.value);
        
        const totalCakes = cartData.reduce((sum, item) => sum + (item.name.toLowerCase().includes('cupcake') ? 0 : item.quantity), 0);
        const pinkCount = parseInt(document.querySelector('input[name="addon_classic_pink"]').value) || 0;
        const blueCount = parseInt(document.querySelector('input[name="addon_classic_blue"]').value) || 0;
        const totalClassic = pinkCount + blueCount;
        const paidClassic = Math.max(0, totalClassic - totalCakes);

        const orderState = {
          items: cartData,
          addons: {
            classic_pink: pinkCount,
            classic_blue: blueCount,
            number_candles: selectedNumbers,
            toppers: selectedToppers,
            special_requests: document.getElementById('details').value,
            coupon: document.getElementById('coupon').value
          },
          subtotal: cartData.reduce((sum, item) => sum + (item.price * item.quantity), 0) + 
                 (selectedNumbers.length * 30) +
                 (selectedToppers.length * 50) +
                 (paidClassic * 10),
          discount: currentDiscount
        };

        localStorage.setItem('localKitchenOrderState', JSON.stringify(orderState));
        window.location.href = '/payment.html';
      });
    </script>
  </body>
</html>
